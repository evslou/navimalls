version: "3.9"

services:
  web:
    build: .
    container_name: shop_router
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=false
      - PORT=${PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3