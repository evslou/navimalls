version: "3.9"

services:
  web:
    build: .
    container_name: shop_router
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env          # ← put your real keys here (never commit this file)
    environment:
      - FLASK_DEBUG=false
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3