version: "3.9"

services:
  web:
    build: .
    container_name: shop_router
    restart: unless-stopped
    ports:
      - "49200:49200"
    environment:
      - FLASK_DEBUG=false
      - PORT=49200
    healthcheck:
      test: CMD curl -f http://localhost:49200/
      interval: 30s
      timeout: 10s
      retries: 3